name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app (aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'reThink ${{ github.ref_name }}'
          releaseBody: |
            See the [CHANGELOG](https://github.com/alexisamp/reThink-2026/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target aarch64-apple-darwin

      - name: Upload .sig and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          # Find the .sig file produced by the build
          SIG_FILE=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos \
            -name "*.app.tar.gz.sig" | head -1)
          TAR_FILE=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos \
            -name "*.app.tar.gz" | head -1)

          if [ -z "$SIG_FILE" ]; then
            echo "ERROR: .sig file not found"
            exit 1
          fi

          echo "Found sig: $SIG_FILE"
          echo "Found tar: $TAR_FILE"

          # Upload the .sig file to the release
          gh release upload "$TAG" "$SIG_FILE" --clobber
          gh release upload "$TAG" "$TAR_FILE" --clobber 2>/dev/null || true

          # Read signature content
          SIG_CONTENT=$(cat "$SIG_FILE")

          # Build the Tauri v2 updater latest.json
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/$(basename "$TAR_FILE")"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "reThink ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_CONTENT}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

          # Upload latest.json to the release
          gh release upload "$TAG" latest.json --clobber
