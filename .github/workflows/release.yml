name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app (aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'reThink ${{ github.ref_name }}'
          releaseBody: 'See the CHANGELOG for details.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target aarch64-apple-darwin

      - name: Sign bundle and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          TAR_FILE=$(find src-tauri/target -name "*.app.tar.gz" 2>/dev/null | grep -v "\.sig$" | head -1)
          if [ -z "$TAR_FILE" ]; then echo "ERROR: .app.tar.gz not found" && exit 1; fi
          echo "Signing: $TAR_FILE"

          npm run tauri -- signer sign "$TAR_FILE"

          SIG_FILE="${TAR_FILE}.sig"
          if [ ! -f "$SIG_FILE" ]; then echo "ERROR: .sig not produced" && exit 1; fi
          echo "Signed: $SIG_FILE"

          TAR_BASENAME=$(basename "$TAR_FILE")
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${TAR_BASENAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          gh release upload "$TAG" "$SIG_FILE" --clobber

          export SIG_FILE VERSION TAG PUB_DATE DOWNLOAD_URL
          python3 -c "
import json, os
sig = open(os.environ['SIG_FILE']).read().strip()
data = {
  'version': os.environ['VERSION'],
  'notes': 'reThink ' + os.environ['TAG'],
  'pub_date': os.environ['PUB_DATE'],
  'platforms': {'darwin-aarch64': {'signature': sig, 'url': os.environ['DOWNLOAD_URL']}}
}
open('latest.json', 'w').write(json.dumps(data, indent=2))
print(json.dumps(data, indent=2))
"

          gh release upload "$TAG" latest.json --clobber
          echo "done: latest.json uploaded for ${TAG}"
